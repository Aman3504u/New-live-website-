<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Peace Ghost</title>
<meta name="description" content="Peace Ghost — leave your feedback in the dark." />

<!-- Horror / display fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@300;400;500;600&family=Rubik+Wet+Paint&family=Special+Elite&display=swap" rel="stylesheet" />

<style>
  /* =========================================================
     Peace Ghost — dark horror landing page
     - Pure black canvas with deep red glow + drips + splatters
     - Glassmorphism feedback card
     - Big wet-paint dripping headline
     ========================================================= */

  :root {
    --bg:           #000000;
    --ink:          #ffffff;
    --muted:        rgba(255, 255, 255, 0.55);
    --faint:        rgba(255, 255, 255, 0.32);
    --red:          #c1121f;
    --red-soft:     #ff2b3d;
    --red-glow:     #ff4256;
    --red-deep:     #5a0f15;
    --glass-bg:     rgba(20, 4, 6, 0.55);
    --glass-bd:     rgba(255, 60, 80, 0.30);
    --glass-bd-hi:  rgba(255, 60, 80, 0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    isolation: isolate;
  }

  /* ===== Layered background ============================== */

  /* Slow-moving red radial glow */
  .bg-glow {
    position: fixed;
    inset: -10vmax;
    z-index: -4;
    pointer-events: none;
    background:
      radial-gradient(48vmax 48vmax at 18% 22%, rgba(193, 18, 31, 0.34), transparent 60%),
      radial-gradient(40vmax 40vmax at 82% 78%, rgba(90, 15, 21, 0.65), transparent 65%),
      radial-gradient(60vmax 60vmax at 50% 110%, rgba(255, 43, 61, 0.12), transparent 70%);
    filter: blur(2px);
    animation: glowDrift 28s ease-in-out infinite alternate;
  }
  @keyframes glowDrift {
    0%   { transform: translate3d(0, 0, 0)        scale(1); }
    50%  { transform: translate3d(2vw, -1.5vh, 0) scale(1.06); }
    100% { transform: translate3d(-1.5vw, 2vh, 0) scale(1.02); }
  }

  /* Drips falling from the top edge */
  .bg-drips {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 36vh;
    z-index: -3;
    pointer-events: none;
    opacity: 0.85;
    background-repeat: no-repeat;
    background-size: 100% 100%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 360' preserveAspectRatio='none'><defs><filter id='b' x='-10%25' y='-10%25' width='120%25' height='120%25'><feGaussianBlur stdDeviation='2'/></filter></defs><g fill='%23c1121f' fill-opacity='0.85' filter='url(%23b)'><path d='M0 0 H1200 V60 Q1140 90 1080 70 T960 80 T840 70 T720 90 T600 60 T480 80 T360 70 T240 90 T120 70 T0 80 Z'/><path d='M40 60 q4 60 0 110 q-4 -10 -8 0 q-4 -22 8 -110 Z'/><path d='M150 80 q3 80 -2 160 q-3 -8 -6 0 q-3 -32 8 -160 Z'/><path d='M280 70 q5 110 -1 200 q-3 -10 -7 0 q-3 -40 8 -200 Z'/><path d='M390 90 q4 50 -1 110 q-3 -10 -7 0 q-3 -22 8 -110 Z'/><path d='M520 75 q5 140 -1 250 q-4 -10 -8 0 q-3 -45 9 -250 Z'/><path d='M640 80 q3 60 -1 140 q-3 -8 -6 0 q-2 -28 7 -140 Z'/><path d='M760 70 q4 100 -1 190 q-4 -10 -8 0 q-3 -36 9 -190 Z'/><path d='M880 90 q3 60 -1 130 q-3 -8 -6 0 q-2 -26 7 -130 Z'/><path d='M1000 70 q5 130 -2 240 q-4 -10 -8 0 q-3 -44 10 -240 Z'/><path d='M1120 85 q3 60 -1 130 q-3 -8 -6 0 q-2 -26 7 -130 Z'/></g></svg>");
  }

  /* Splatter / ink layer (abstract, NOT realistic blood) */
  .bg-splatter {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    opacity: 0.55;
    mix-blend-mode: screen;
    background-repeat: no-repeat;
    background-size:
      52vmax 52vmax,
      40vmax 40vmax,
      30vmax 30vmax;
    background-position:
      -10vmax -8vmax,
      72vw 60vh,
      40vw -10vh;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600'><defs><filter id='f' x='-30%25' y='-30%25' width='160%25' height='160%25'><feGaussianBlur stdDeviation='6'/></filter></defs><g filter='url(%23f)' fill='%23c1121f' fill-opacity='0.55'><circle cx='180' cy='200' r='90'/><circle cx='260' cy='240' r='30'/><circle cx='110' cy='260' r='18'/><circle cx='320' cy='180' r='14'/><circle cx='80' cy='180' r='10'/><circle cx='220' cy='140' r='22'/><circle cx='360' cy='260' r='8'/><circle cx='400' cy='320' r='40'/><circle cx='450' cy='360' r='16'/><circle cx='160' cy='340' r='12'/><circle cx='240' cy='360' r='6'/><circle cx='130' cy='420' r='8'/></g></svg>"),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600'><defs><filter id='f' x='-30%25' y='-30%25' width='160%25' height='160%25'><feGaussianBlur stdDeviation='10'/></filter></defs><g filter='url(%23f)' fill='%235a0f15' fill-opacity='0.7'><circle cx='300' cy='300' r='150'/><circle cx='420' cy='240' r='40'/><circle cx='180' cy='400' r='28'/><circle cx='460' cy='400' r='22'/><circle cx='240' cy='200' r='18'/></g></svg>"),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600'><defs><filter id='f' x='-30%25' y='-30%25' width='160%25' height='160%25'><feGaussianBlur stdDeviation='4'/></filter></defs><g filter='url(%23f)' fill='%23ff2b3d' fill-opacity='0.35'><circle cx='300' cy='300' r='80'/><circle cx='380' cy='260' r='14'/><circle cx='220' cy='340' r='12'/><circle cx='340' cy='420' r='8'/></g></svg>");
    animation: splatterDrift 50s linear infinite alternate;
  }
  @keyframes splatterDrift {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-2vw, 1.5vh, 0); }
  }

  /* Scratches / grunge overlay */
  .bg-scratch {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.10;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 800'><g stroke='%23ffffff' stroke-width='0.6' stroke-linecap='round' fill='none' opacity='0.7'><path d='M40 120 L780 90'/><path d='M10 240 L760 280'/><path d='M120 400 L780 360'/><path d='M30 560 L770 600'/><path d='M200 700 L780 740'/><path d='M50 90 L380 60'/><path d='M420 130 L760 110'/><path d='M30 470 L420 460'/><path d='M460 510 L780 480'/><path d='M40 670 L420 650'/></g><g stroke='%23ffffff' stroke-width='0.3' fill='none' opacity='0.5'><path d='M0 200 Q200 180 400 220 T800 200'/><path d='M0 500 Q200 540 400 480 T800 520'/></g></svg>");
    background-size: 120vmin 120vmin;
  }

  /* Vignette so edges feel cinematic */
  .bg-vignette {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(120% 90% at 50% 50%, transparent 50%, rgba(0,0,0,0.85) 100%);
  }

  /* ===== Header / brand ================================== */

  header.brand {
    padding: 38px 24px 0;
    text-align: center;
    z-index: 2;
  }
  .ghost-mark {
    display: inline-block;
    position: relative;
    width: 130px;
    height: 130px;
    filter:
      drop-shadow(0 0 6px rgba(255, 60, 80, 0.55))
      drop-shadow(0 0 18px rgba(255, 43, 61, 0.65))
      drop-shadow(0 0 36px rgba(193, 18, 31, 0.55));
    animation: pulseGhost 4.2s ease-in-out infinite;
  }
  @keyframes pulseGhost {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255,60,80,0.55)) drop-shadow(0 0 18px rgba(255,43,61,0.65)) drop-shadow(0 0 36px rgba(193,18,31,0.55)); }
    50%      { filter: drop-shadow(0 0 4px rgba(255,60,80,0.45)) drop-shadow(0 0 26px rgba(255,43,61,0.85)) drop-shadow(0 0 50px rgba(193,18,31,0.55)); }
  }

  .brand-name {
    display: block;
    margin-top: -14px;
    font-family: 'Rubik Wet Paint', 'Creepster', cursive;
    font-size: 32px;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow:
      0 0 6px rgba(255, 255, 255, 0.45),
      0 0 16px rgba(255, 43, 61, 0.55),
      0 0 32px rgba(193, 18, 31, 0.45);
  }

  /* ===== Hero ============================================ */

  main.hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: 28px 24px 140px;
    gap: 24px;
    z-index: 2;
  }

  .hero-eyebrow {
    margin: 0;
    font-family: 'Special Elite', serif;
    font-size: 14px;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: var(--red-soft);
    text-shadow: 0 0 10px rgba(255, 43, 61, 0.45);
    padding-left: 0.55em; /* compensate for letter-spacing on last char */
  }

  .hero-title {
    font-family: 'Rubik Wet Paint', 'Creepster', cursive;
    font-weight: 400;
    font-size: clamp(56px, 13vw, 168px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    margin: 0;
    color: #ffffff;
    text-shadow:
      0 0 10px rgba(255, 255, 255, 0.55),
      0 0 28px rgba(255, 43, 61, 0.45),
      0 0 60px rgba(193, 18, 31, 0.40),
      0 6px 0 rgba(0, 0, 0, 0.6);
    animation: flicker 6s steps(1) infinite;
    word-spacing: 0.15em;
  }
  @keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
    20%, 24%, 55%                     { opacity: 0.78; }
    56%                                { opacity: 0.92; }
  }

  /* ===== Glassmorphism feedback card ===================== */

  .feedback-card {
    width: min(560px, calc(100vw - 32px));
    margin-top: 18px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-bd);
    border-radius: 18px;
    padding: 26px 26px 24px;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    box-shadow:
      0 12px 50px rgba(0, 0, 0, 0.7),
      inset 0 0 0 1px rgba(255, 255, 255, 0.03),
      0 0 60px rgba(193, 18, 31, 0.18);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .feedback-card::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,43,61,0.65), transparent 40%, rgba(255,43,61,0.35));
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
    opacity: 0.7;
  }
  .feedback-card:focus-within {
    border-color: var(--glass-bd-hi);
    box-shadow:
      0 12px 50px rgba(0, 0, 0, 0.7),
      0 0 90px rgba(255, 43, 61, 0.22);
  }

  .form-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 4px 0 22px;
    font-family: 'Rubik Wet Paint', 'Creepster', cursive;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 0.10em;
    color: #fff;
    text-shadow: 0 0 10px rgba(255, 43, 61, 0.55), 0 0 24px rgba(193, 18, 31, 0.35);
  }
  .form-title svg { display: block; opacity: 0.95; }

  .field { margin-top: 14px; text-align: left; }
  .field label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .input-wrap {
    position: relative;
  }
  .feedback-card input,
  .feedback-card textarea {
    width: 100%;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 60, 80, 0.30);
    color: #fff;
    border-radius: 10px;
    padding: 12px 42px 12px 14px;
    font-family: inherit;
    font-size: 14.5px;
    line-height: 1.5;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    outline: none;
  }
  .feedback-card textarea {
    min-height: 130px;
    resize: vertical;
  }
  .feedback-card input::placeholder,
  .feedback-card textarea::placeholder { color: rgba(255, 255, 255, 0.30); }
  .feedback-card input:focus,
  .feedback-card textarea:focus {
    border-color: rgba(255, 43, 61, 0.85);
    background: rgba(0, 0, 0, 0.7);
    box-shadow: 0 0 0 3px rgba(255, 43, 61, 0.18);
  }
  .field-icon {
    position: absolute;
    right: 12px;
    top: 12px;
    width: 18px;
    height: 18px;
    color: var(--red-soft);
    opacity: 0.85;
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(255, 43, 61, 0.45));
  }
  .field-icon.bottom { top: auto; bottom: 12px; }

  .submit-btn {
    margin-top: 22px;
    appearance: none;
    border: 0;
    cursor: pointer;
    width: 100%;
    padding: 15px 22px;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(180deg, #ff3548 0%, #c1121f 55%, #720b13 100%);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.07) inset,
      0 10px 26px rgba(193, 18, 31, 0.5),
      0 0 36px rgba(255, 43, 61, 0.45);
    transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.25s ease;
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
  }
  .submit-btn:hover {
    filter: brightness(1.18) saturate(1.1);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.10) inset,
      0 12px 32px rgba(193, 18, 31, 0.6),
      0 0 70px rgba(255, 43, 61, 0.65);
    transform: translateY(-1px);
  }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn[disabled] { opacity: 0.6; cursor: progress; filter: none; transform: none; }

  .status-text {
    margin: 12px 0 0;
    font-size: 12.5px;
    color: var(--faint);
    min-height: 1.3em;
    letter-spacing: 0.04em;
  }
  .status-text.ok  { color: #f8c9cf; }
  .status-text.err { color: #ff8090; }

  /* ===== Disclaimer ====================================== */

  .disclaimer {
    max-width: 640px;
    margin: 28px auto 0;
    text-align: center;
    color: rgba(255, 255, 255, 0.78);
    font-family: 'Special Elite', 'Inter', serif;
    font-size: 14px;
    line-height: 2;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
  }
  .disclaimer .red {
    color: var(--red-soft);
    text-shadow: 0 0 10px rgba(255, 43, 61, 0.55);
  }

  /* ===== Footer ========================================== */

  footer.more {
    position: fixed;
    right: 22px;
    bottom: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 3;
    pointer-events: none;
  }
  footer.more .x {
    font-family: 'Creepster', 'Rubik Wet Paint', cursive;
    font-size: 26px;
    line-height: 1;
    color: var(--red-soft);
    text-shadow: 0 0 10px rgba(255, 43, 61, 0.7), 0 0 22px rgba(193, 18, 31, 0.6);
  }
  footer.more .label {
    font-family: 'Special Elite', serif;
    font-size: 11.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }

  /* ===== Responsive tweaks =============================== */

  @media (max-width: 520px) {
    header.brand     { padding-top: 28px; }
    .ghost-mark      { width: 100px; height: 100px; }
    .brand-name      { font-size: 24px; margin-top: -10px; }
    main.hero        { padding: 18px 14px 110px; gap: 18px; }
    .hero-eyebrow    { font-size: 11px; letter-spacing: 0.4em; }
    .feedback-card   { padding: 22px 18px 20px; border-radius: 14px; }
    .submit-btn      { padding: 13px 18px; font-size: 13px; letter-spacing: 0.22em; }
    .disclaimer      { font-size: 12.5px; line-height: 1.95; letter-spacing: 0.14em; }
    footer.more      { right: 14px; bottom: 12px; }
    footer.more .x   { font-size: 22px; }
    footer.more .label { font-size: 10.5px; letter-spacing: 0.18em; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-glow, .bg-splatter, .ghost-mark, .hero-title { animation: none !important; }
  }
</style>
</head>
<body>

<!-- Atmospheric background layers (purely decorative) -->
<div class="bg-glow"     aria-hidden="true"></div>
<div class="bg-drips"    aria-hidden="true"></div>
<div class="bg-splatter" aria-hidden="true"></div>
<div class="bg-scratch"  aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>

<header class="brand">
  <!-- Ghost-skull-in-ring mark -->
  <div class="ghost-mark" aria-label="PeaceGhost mark">
    <svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
          <stop offset="60%" stop-color="#000" stop-opacity="0"/>
          <stop offset="92%" stop-color="#ff2b3d" stop-opacity="0.65"/>
          <stop offset="100%" stop-color="#5a0f15" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0"   stop-color="#f4f4f4" stop-opacity="0.96"/>
          <stop offset="1"   stop-color="#bdbdbd" stop-opacity="0.78"/>
        </linearGradient>
      </defs>

      <!-- glowing red ring -->
      <circle cx="100" cy="100" r="78" fill="none" stroke="#ff2b3d" stroke-width="2.5" opacity="0.85"/>
      <circle cx="100" cy="100" r="78" fill="url(#ringGlow)"/>
      <!-- splatter accents on the ring -->
      <g fill="#c1121f" opacity="0.85">
        <circle cx="174" cy="78"  r="3"/>
        <circle cx="30"  cy="118" r="2.4"/>
        <circle cx="92"  cy="22"  r="2.2"/>
        <circle cx="124" cy="180" r="2.6"/>
      </g>

      <!-- hood / shroud -->
      <path d="M100 38
               C76 38 60 56 60 84
               L60 138
               C60 146 64 148 68 144
               C74 138 80 138 86 144
               C90 148 94 148 98 144
               C102 140 108 140 112 144
               C116 148 120 148 124 144
               C130 138 136 138 142 144
               C146 148 150 146 150 138
               L150 84
               C150 56 124 38 100 38 Z"
            fill="url(#hood)"
            stroke="rgba(0,0,0,0.45)" stroke-width="0.8"/>
      <!-- inside of hood (darker face area) -->
      <path d="M100 56
               C84 56 74 70 74 92
               L74 116
               C74 122 78 124 82 121
               C86 118 90 118 94 121
               C97 124 100 124 100 124
               C100 124 103 124 106 121
               C110 118 114 118 118 121
               C122 124 126 122 126 116
               L126 92
               C126 70 116 56 100 56 Z"
            fill="#0a0103"/>

      <!-- skull eyes (large dark hollows) -->
      <ellipse cx="89"  cy="92"  rx="7" ry="9" fill="#000"/>
      <ellipse cx="111" cy="92"  rx="7" ry="9" fill="#000"/>
      <!-- faint red eye glow -->
      <circle cx="89"  cy="93" r="2.4" fill="#ff2b3d" opacity="0.9"/>
      <circle cx="111" cy="93" r="2.4" fill="#ff2b3d" opacity="0.9"/>
      <!-- skull nose -->
      <path d="M100 102 l-3 9 h6 z" fill="#000"/>
      <!-- skull teeth row -->
      <g fill="#000">
        <rect x="86" y="115" width="3" height="6"/>
        <rect x="91" y="115" width="3" height="7"/>
        <rect x="96" y="115" width="3" height="8"/>
        <rect x="101" y="115" width="3" height="8"/>
        <rect x="106" y="115" width="3" height="7"/>
        <rect x="111" y="115" width="3" height="6"/>
      </g>

      <!-- a couple of red drips falling off the bottom of the hood -->
      <g fill="#c1121f" opacity="0.9">
        <path d="M76 148 q1 12 -1 22 q-2 -3 -3 0 q-1 -8 4 -22 z"/>
        <path d="M124 150 q1 16 -1 28 q-2 -4 -3 0 q-1 -10 4 -28 z"/>
        <path d="M100 152 q1 8 -1 16 q-2 -3 -2 0 q-1 -6 3 -16 z"/>
      </g>
    </svg>
  </div>
  <span class="brand-name">PEACEGHOST</span>
</header>

<main class="hero">
  <p class="hero-eyebrow">Brought to you by</p>
  <h1 class="hero-title">PEACE&nbsp;GHOST</h1>

  <!-- Feedback card -->
  <form id="feedbackForm" class="feedback-card" autocomplete="off" novalidate>
    <div class="form-title">
      <!-- left ornament -->
      <svg width="56" height="14" viewBox="0 0 56 14" aria-hidden="true">
        <g fill="none" stroke="#ff2b3d" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
          <path d="M2 7 H42"/>
          <path d="M44 7 l4 -4 m0 8 l-4 -4"/>
        </g>
      </svg>

<!-- =========================================================
     Logic
     - Stores feedback in localStorage (always, as a backup)
     - Best-effort POST to Supabase `feedbacks` table
     - Alerts the user on submit
     ========================================================= -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  // Public anon key — safe to expose. Real access control is enforced by
  // RLS policies on public.feedbacks.
  const SUPABASE_URL = 'https://lfdtxuzewghjyxyrhdua.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmZHR4dXpld2doanl4eXJoZHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzI0MDksImV4cCI6MjA5MzA0ODQwOX0.DdOqAgfwhcQJka0P-HVYx9QeAp0eOAXBYqvMZj5Ms7I';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form     = document.getElementById('feedbackForm');
  const nameEl   = document.getElementById('pgName');
  const fbEl     = document.getElementById('pgFeedback');
  const btn      = document.getElementById('pgSubmit');
  const status   = document.getElementById('pgStatus');

  const LS_KEY = 'peaceghost.feedback.log';

  function appendLocal(entry) {
    try {
      const raw = localStorage.getItem(LS_KEY);
      const list = raw ? JSON.parse(raw) : [];
      if (Array.isArray(list)) {
        list.push(entry);
        const trimmed = list.slice(-200);
        localStorage.setItem(LS_KEY, JSON.stringify(trimmed));
      }
    } catch (e) {
      console.warn('[peaceghost] localStorage write failed:', e);
    }
  }

  function setStatus(text, kind) {
    status.textContent = text || '';
    status.classList.remove('ok', 'err');
    if (kind) status.classList.add(kind);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name     = nameEl.value.trim();
    const feedback = fbEl.value.trim();
    if (!name || !feedback) {
      setStatus('Both fields are required.', 'err');
      return;
    }

    btn.disabled = true;
    setStatus('Sending into the void…');

    const entry = {
      name,
      feedback,
      created_at_local: new Date().toISOString(),
    };
    appendLocal(entry);

    let supabaseOk = false;
    try {
      const { error } = await supabase.from('feedbacks').insert([{ name, feedback }]);
      if (error) {
        console.error('[peaceghost] supabase insert failed:', error);
      } else {
        supabaseOk = true;
      }
    } catch (err) {
      console.error('[peaceghost] supabase request threw:', err);
    }

    btn.disabled = false;
    if (supabaseOk) {
      setStatus('Thanks — your whisper has been received.', 'ok');
      alert('Thanks! Your feedback has been received.');
    } else {
      setStatus('Saved offline (couldn\u2019t reach the server right now).', 'err');
      alert('Saved locally — we couldn\u2019t reach the server, but your feedback is stored on this device.');
    }
    form.reset();
  });
</script>

</body>
